<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Singles Nearby</title>
    <style>
        /* CSS Same as before */
        * { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com') no-repeat center center/cover; filter: blur(8px) brightness(0.4); z-index: -1; transform: scale(1.1); }
        .container { text-align: center; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 40px 25px; border-radius: 25px; border: 1px solid rgba(255, 45, 85, 0.4); width: 92%; max-width: 400px; box-shadow: 0 0 40px rgba(255, 45, 85, 0.2); color: #fff; position: relative; z-index: 10; }
        .logo-heart { font-size: 55px; color: #ff2d55; margin-bottom: 5px; animation: heartBeat 1.2s infinite; }
        @keyframes heartBeat { 0%, 30%, 60% { transform: scale(1); } 15% { transform: scale(1.2); } 45% { transform: scale(1.15); } }
        h1 { font-size: 24px; margin: 10px 0; font-weight: 800; color: #fff; }
        .location-text { color: #ff2d55; font-weight: bold; }
        p { font-size: 16px; color: rgba(255,255,255,0.9); line-height: 1.5; margin-bottom: 25px; }
        .step { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn { background: linear-gradient(135deg, #ff2d55, #d4143a); color: white; border: none; padding: 18px; font-size: 17px; border-radius: 12px; cursor: pointer; transition: 0.3s; width: 100%; margin-bottom: 12px; font-weight: 700; text-transform: uppercase; box-shadow: 0 8px 15px rgba(255, 45, 85, 0.3); }
        .btn:active { transform: scale(0.98); }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ff2d55; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="bg-image"></div>

<div class="container">
    <div class="logo-heart">❤️</div>

    <div id="step1" class="step active">
        <h1>Private Access</h1>
        <p>Are you at least 18 years old and living near <span class="location-text" id="city-name">your area</span>?</p>
        <button class="btn" onclick="nextStep(2)">YES, I AM 18+</button>
        <button class="btn" style="background:transparent; border:1px solid #777; box-shadow:none;" onclick="alert('Access Denied')">NO, I'M NOT</button>
    </div>

    <div id="step2" class="step">
        <h1>What's Your Goal?</h1>
        <p>Many singles in <span class="location-text" id="city-name2">your area</span> are online. What do you want?</p>
        <button class="btn" onclick="nextStep(3)">Casual Connection</button>
        <button class="btn" onclick="nextStep(3)">Serious Relationship</button>
    </div>

    <div id="step3" class="step">
        <h1>Privacy Rules</h1>
        <p>Do you promise to keep member photos private?</p>
        <button class="btn" onclick="finalStep()">I AGREE & ENTER</button>
    </div>

    <div id="loading" class="step">
        <h1 id="loading-title">Analyzing...</h1>
        <div class="loader"></div>
        <p id="loading-text">Finding profiles near you...</p>
    </div>
</div>

<script>
    // 1. Sabse pehle functions define karein taaki ye hamesha available rahein
    function nextStep(step) {
        console.log("Moving to step: " + step); // Debugging ke liye
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        const nextEl = document.getElementById('step' + step);
        if (nextEl) nextEl.classList.add('active');
    }

    function finalStep() {
        const MY_CPA_LINK = "https://tr.cpatrackmaster.com";
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('loading').classList.add('active');
        
        setTimeout(() => { 
            document.getElementById('loading-title').innerText = "Matching Found!";
            document.getElementById('loading-text').innerText = "Redirecting to private gallery..."; 
        }, 1500);

        setTimeout(() => {
            window.location.replace(MY_CPA_LINK); // window.location.href se behtar hai
        }, 3000);
    }

    // 2. Location API ko try-catch mein rakhein taaki error script ko na roke
    async function getCity() {
        try {
            const response = await fetch('https://ipapi.co');
            const data = await response.json();
            if(data.city) {
                document.getElementById('city-name').innerText = data.city;
                document.getElementById('city-name2').innerText = data.city;
            }
        } catch (error) {
            console.log("Location fetch failed, using default text.");
        }
    }
    getCity();
</script>

</body>
</html>
